name: CI — Validate & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build Docker image (validate Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sia-backend:ci

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api
          VITE_API_KEY: ci-test-key

      - name: Build Docker image (validate Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sia-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:3001/api
            VITE_API_KEY=ci-test-key

  # ─── docker-compose smoke test ────────────────────────────────────────────
  compose-validate:
    name: docker-compose config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config --quiet
        env:
          API_SECRET_KEY: ci-test-key-32-chars-minimum-abc
          GEMINI_API_KEY: ci-test-gemini
          SMTP_HOST: smtp.example.com
          SMTP_PORT: 587
          SMTP_USER: test@example.com
          SMTP_PASS: test-pass
